<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCraft AI — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28;
            --border:#2a2a3d; --accent:#7c6dfa; --accent2:#fa6d8e;
            --text:#e8e8f0; --muted:#7070a0; --correct:#4dde9a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'DM Sans',sans-serif; min-height:100vh;
            display:flex; align-items:center; justify-content:center; padding:24px;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse 60% 50% at 30% 30%, rgba(124,109,250,0.13) 0%, transparent 60%);
            pointer-events:none;
        }
        .card {
            position:relative; z-index:1;
            background:var(--surface); border:1px solid var(--border);
            border-radius:24px; padding:48px 44px; width:100%; max-width:420px;
            animation:fadeUp 0.5s ease both;
        }
        .icon-wrap {
            width:64px; height:64px; margin:0 auto 22px;
            background:linear-gradient(135deg,rgba(124,109,250,0.2),rgba(250,109,142,0.2));
            border:1px solid var(--border); border-radius:16px;
            display:flex; align-items:center; justify-content:center; font-size:28px;
        }
        h1 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; text-align:center; margin-bottom:6px; }
        .subtitle { color:var(--muted); font-size:0.86rem; text-align:center; margin-bottom:28px; }
        .email-badge {
            text-align:center; margin-bottom:24px;
            padding:10px 16px; background:var(--surface2);
            border:1px solid var(--border); border-radius:10px;
            font-size:0.85rem; color:var(--accent3);
        }
        .field-label { display:block; font-size:0.73rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
        .field-group { margin-bottom:16px; }
        .input-wrap { position:relative; }
        .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--muted); pointer-events:none; }
        .field-input {
            width:100%; background:var(--surface2); border:1px solid var(--border);
            border-radius:12px; padding:13px 44px 13px 42px;
            color:var(--text); font-family:'DM Sans',sans-serif;
            font-size:0.9rem; outline:none; transition:border-color 0.2s;
        }
        .field-input::placeholder { color:var(--muted); }
        .field-input:focus { border-color:var(--accent); }
        .pwd-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; }
        .pwd-toggle:hover { color:var(--text); }

        .strength-wrap { margin-top:8px; }
        .strength-bar-bg { height:4px; background:var(--surface2); border-radius:100px; overflow:hidden; }
        .strength-bar { height:100%; width:0%; border-radius:100px; transition:width 0.3s, background 0.3s; }
        .strength-lbl { font-size:0.7rem; color:var(--muted); margin-top:4px; }

        .btn-submit { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:white; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.3s; margin-top:8px; }
        .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(124,109,250,0.35); }
        .alert { padding:14px 16px; border-radius:12px; font-size:0.86rem; margin-bottom:20px; }
        .alert-error { background:rgba(250,109,142,0.1); border:1px solid rgba(250,109,142,0.3); color:var(--accent2); }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">🔒</div>
    <h1>Set New Password</h1>
    <p class="subtitle">Choose a strong password for your account.</p>

    {% if email %}
    <div class="email-badge">Resetting password for: {{ email }}</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="post">
        <div class="field-group">
            <label class="field-label">New Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" name="password" class="field-input"
                       id="pwdInput" placeholder="Minimum 8 characters" required minlength="8">
                <button type="button" class="pwd-toggle" onclick="togglePwd('pwdInput',this)">👁</button>
            </div>
            <div class="strength-wrap" id="strengthWrap" style="display:none;">
                <div class="strength-bar-bg"><div class="strength-bar" id="strengthBar"></div></div>
                <div class="strength-lbl" id="strengthLbl">Too short</div>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Confirm Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" name="confirm_password" class="field-input"
                       id="cpwdInput" placeholder="Repeat your password" required>
                <button type="button" class="pwd-toggle" onclick="togglePwd('cpwdInput',this)">👁</button>
            </div>
        </div>

        <input type="hidden" name="token" value="{{ token }}">
        <button type="submit" class="btn-submit">Update Password →</button>
    </form>
</div>

<script>
function togglePwd(id, btn) {
    const el = document.getElementById(id);
    const show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
}

const pwd = document.getElementById('pwdInput');
const bar = document.getElementById('strengthBar');
const lbl = document.getElementById('strengthLbl');
const wrap = document.getElementById('strengthWrap');

pwd.addEventListener('input', () => {
    const v = pwd.value;
    wrap.style.display = v.length ? 'block' : 'none';
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const lvls = [
        {w:'25%',c:'#fa6d8e',t:'Weak'},
        {w:'50%',c:'#fac86d',t:'Fair'},
        {w:'75%',c:'#6dfae0',t:'Good'},
        {w:'100%',c:'#4dde9a',t:'Strong'}
    ];
    const l = v.length < 8 ? {w:'15%',c:'#fa6d8e',t:'Too short'} : lvls[s-1] || lvls[0];
    bar.style.width = l.w; bar.style.background = l.c;
    lbl.textContent = l.t; lbl.style.color = l.c;
});
</script>
</body>
</html>
